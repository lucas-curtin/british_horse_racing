# Root directory (defaults to current working directory if omitted)
base_dir: .

# Paths to Chrome and Chromedriver
# On macOS, the scraper will fall back to the system Chrome install and Selenium
# Manager if these local paths do not exist.
chrome_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
chromedriver_path: "chromedriver-mac-x64/chromedriver"

# Output directories
output_dir: output

# Date range (inclusive start and inclusive end)
# For a single-day run, set start and end to the same date.
dates:
  start: "2026-03-27"
  end: "2026-03-27"

# Parallel scraping settings
num_workers: 1
